<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var k = 'carcare_proto_theme';
          var t = localStorage.getItem(k);
          if (t !== 'light' && t !== 'dark') {
            t =
              window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          }
          document.documentElement.dataset.theme = t;
          document.documentElement.classList.toggle('dark', t === 'dark');
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
    <meta name="viewport" content="width=1280" />
    <title>CarCare — MVP UI/UX Prototype (B2C + B2B + Flutter guide)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="min-h-screen transition-colors">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
