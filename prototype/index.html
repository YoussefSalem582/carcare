<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280" />
<title>CarCare — MVP UI/UX Prototype (B2C + B2B + Flutter guide)</title>
<script>
(function () {
  try {
    var th = localStorage.getItem('carcare_proto_theme');
    if (th === 'dark' || (th === null && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.dataset.theme = 'dark';
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.dataset.theme = 'light';
    }
    var loc = localStorage.getItem('carcare_proto_locale') || 'en';
    document.documentElement.lang = loc === 'ar-EG' ? 'ar-EG' : 'en';
    document.documentElement.dir = loc === 'ar-EG' ? 'rtl' : 'ltr';
  } catch (e) {}
})();
</script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: { extend: {} }
};
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/prototype.css" />
</head>
<body class="min-h-screen bg-slate-100 text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors">

<div class="max-w-[1600px] mx-auto px-6 py-8 proto-shell">
  <header class="flex flex-wrap items-center justify-between gap-4 mb-6">
    <div class="flex items-center gap-3 min-w-0">
      <div class="w-11 h-11 rounded-2xl flex items-center justify-center shadow-md ring-1 ring-black/5 dark:ring-white/10 shrink-0" style="background:var(--brand);color:white;"><i data-lucide="wrench" class="w-5 h-5"></i></div>
      <div class="min-w-0">
        <div id="shellTitle" class="text-lg font-bold tracking-tight text-slate-900 dark:text-slate-100 truncate">CarCare — MVP UI/UX Prototype</div>
        <div id="shellSubtitle" class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">Map-first maintenance marketplace · B2C + B2B · Flutter team handbook</div>
      </div>
    </div>
    <div class="flex flex-wrap items-center justify-end gap-2">
      <div class="flex items-center gap-1 rounded-xl border border-slate-200/90 dark:border-slate-700 bg-white/90 dark:bg-slate-900/90 p-1 shadow-sm">
        <button type="button" id="protoLocaleEn" class="px-2.5 py-1.5 rounded-lg text-xs font-semibold tab-active" title="English">EN</button>
        <button type="button" id="protoLocaleAr" class="px-2.5 py-1.5 rounded-lg text-xs font-semibold text-slate-600 dark:text-slate-400" title="العربية (مصر)">عربي</button>
      </div>
      <button type="button" id="protoThemeToggle" class="inline-flex items-center justify-center w-10 h-10 rounded-xl border border-slate-200/90 dark:border-slate-700 bg-white/90 dark:bg-slate-900/90 shadow-sm tap" aria-label="Toggle theme">
        <i data-lucide="sun" class="w-5 h-5 dark:hidden text-amber-500"></i>
        <i data-lucide="moon" class="w-5 h-5 hidden dark:inline text-slate-300"></i>
      </button>
      <div class="flex flex-wrap items-center justify-end gap-1.5 bg-white/90 dark:bg-slate-900/90 backdrop-blur rounded-2xl p-1 border border-slate-200/80 dark:border-slate-700 shadow-sm max-w-xl">
        <button type="button" id="toggleB2C" class="px-3 py-2 rounded-lg text-sm font-semibold tab-active whitespace-nowrap">B2C — Car Owner</button>
        <button type="button" id="toggleB2B" class="px-3 py-2 rounded-lg text-sm font-semibold text-slate-600 dark:text-slate-400 whitespace-nowrap">B2B — Service Center</button>
        <button type="button" id="toggleFlutterGuide" class="px-3 py-2 rounded-lg text-sm font-semibold text-slate-600 dark:text-slate-400 whitespace-nowrap">Flutter Team Guide</button>
      </div>
    </div>
  </header>

  <div class="grid grid-cols-[260px_1fr] gap-5">
    <aside class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200/90 dark:border-slate-700 p-4 shadow-sm shadow-slate-200/50 dark:shadow-none h-fit sticky top-4">
      <div id="shellScreensLabel" class="label mb-2 text-slate-600 dark:text-slate-400">Screens</div>
      <div id="screenList" class="screen-list flex flex-col gap-1"></div>
      <div class="divider my-4 dark:bg-slate-700"></div>
      <div class="text-xs text-slate-500 dark:text-slate-400 leading-relaxed">
        <div class="flex items-center gap-2 mb-1"><span class="dot" style="background:#10B981"></span><span id="shellLegendMvp">MVP scope (Phase 1)</span></div>
        <div class="flex items-center gap-2"><span class="dot" style="background:#F59E0B"></span><span id="shellLegendP2">Phase 2 — retention layer</span></div>
      </div>
    </aside>

    <main class="flex items-start justify-center pt-4 pb-10 w-full min-w-0" style="min-height: 900px;">
      <div id="b2cLayout" class="proto-pair-layout ftg-main-layout w-full max-w-full min-w-0 px-1">
        <div id="b2cStage" class="phone-frame flex-shrink-0"></div>
        <aside id="b2cDetailAside" class="ftg-handbook-aside proto-detail-aside dark:border-slate-700" aria-label="Screen spec"></aside>
      </div>
      <div id="b2bLayout" class="proto-pair-layout ftg-main-layout w-full max-w-full min-w-0 px-1" hidden>
        <div id="b2bStage" class="phone-frame flex-shrink-0"></div>
        <aside id="b2bDetailAside" class="ftg-handbook-aside proto-detail-aside dark:border-slate-700" aria-label="Screen spec"></aside>
      </div>
      <div id="ftgLayout" class="ftg-guide-layout ftg-main-layout w-full max-w-full min-w-0 px-1" hidden>
        <aside id="ftgHandbookAside" class="ftg-handbook-aside proto-detail-aside ftg-guide-full mx-auto dark:border-slate-700" aria-label="Flutter Team Guide — technical handbook"></aside>
      </div>
    </main>
  </div>

  <footer id="shellFooter" class="mt-12 text-xs text-slate-500 dark:text-slate-400 text-center pb-8">
    Built for developer handoff. Flutter target — layouts translate to Material/Cupertino widgets. Mock data is illustrative.
  </footer>
</div>

<script src="js/i18n/core.js"></script>
<script src="js/i18n/strings-ar-EG.js"></script>
<script src="js/i18n/catalog-ar-all.js"></script>

<script src="js/helpers.js"></script>

<script src="js/b2c/discovery/tow.js"></script>
<script src="js/b2c/discovery.js"></script>
<script src="js/b2c/booking.js"></script>
<script src="js/b2c/account.js"></script>
<script src="js/b2c/index.js"></script>
<script src="js/b2b/funnel.js"></script>
<script src="js/b2b/onboarding.js"></script>
<script src="js/b2b/operations.js"></script>
<script src="js/b2b/index.js"></script>
<script src="js/ftg/index.js"></script>
<script src="js/app.js"></script>
<script src="js/i18n/shell-bindings.js"></script>
</body>
</html>
