<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280" />
<title>CarCare — MVP UI/UX Prototype (B2C + B2B + Flutter guide)</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/prototype.css" />
</head>
<body class="min-h-screen">

<div class="max-w-[1600px] mx-auto px-6 py-8 proto-shell">
  <header class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-3">
      <div class="w-11 h-11 rounded-2xl flex items-center justify-center shadow-md ring-1 ring-black/5" style="background:var(--brand);color:white;"><i data-lucide="wrench" class="w-5 h-5"></i></div>
      <div>
        <div class="text-lg font-bold tracking-tight text-slate-900">CarCare — MVP UI/UX Prototype</div>
        <div class="text-xs text-slate-500 mt-0.5">Map-first maintenance marketplace · B2C + B2B · Flutter team handbook</div>
      </div>
    </div>
    <div class="flex flex-wrap items-center justify-end gap-1.5 bg-white/90 backdrop-blur rounded-2xl p-1 border border-slate-200/80 shadow-sm max-w-xl">
      <button type="button" id="toggleB2C" class="px-3 py-2 rounded-lg text-sm font-semibold tab-active whitespace-nowrap">B2C — Car Owner</button>
      <button type="button" id="toggleB2B" class="px-3 py-2 rounded-lg text-sm font-semibold text-slate-600 whitespace-nowrap">B2B — Service Center</button>
      <button type="button" id="toggleFlutterGuide" class="px-3 py-2 rounded-lg text-sm font-semibold text-slate-600 whitespace-nowrap">Flutter Team Guide</button>
    </div>
  </header>

  <div class="grid grid-cols-[260px_1fr_340px] gap-5">
    <aside class="bg-white rounded-2xl border border-slate-200/90 p-4 shadow-sm shadow-slate-200/50 h-fit sticky top-4">
      <div class="label mb-2 text-slate-600">Screens</div>
      <div id="screenList" class="screen-list flex flex-col gap-1"></div>
      <div class="divider my-4"></div>
      <div class="text-xs text-slate-500 leading-relaxed">
        <div class="flex items-center gap-2 mb-1"><span class="dot" style="background:#10B981"></span>MVP scope (Phase 1)</div>
        <div class="flex items-center gap-2"><span class="dot" style="background:#F59E0B"></span>Phase 2 — retention layer</div>
      </div>
    </aside>

    <main class="flex items-start justify-center pt-4 pb-10" style="min-height: 900px;">
      <div id="b2cStage" class="phone-frame"></div>
      <div id="b2bStage" class="phone-frame hidden"></div>
      <div id="ftgStage" class="phone-frame hidden"></div>
    </main>

    <aside class="rail rounded-2xl border border-slate-200/90 p-5 shadow-sm shadow-slate-200/50 h-fit sticky top-4" style="max-height: calc(100vh - 32px);">
      <div class="label mb-2 text-slate-600">Screen spec</div>
      <div id="specPanel"></div>
    </aside>
  </div>

  <footer class="mt-12 text-xs text-slate-500 text-center pb-8">
    Built for developer handoff. Flutter target — layouts translate to Material/Cupertino widgets. Mock data is illustrative.
  </footer>
</div>

<script src="js/data/screens.js"></script>
<script src="js/shared/chrome.js"></script>
<script src="js/helpers.js"></script>
<script src="js/b2c/funnel.js"></script>
<script src="js/b2c/discovery/addcar.js"></script>
<script src="js/b2c/discovery/map.js"></script>
<script src="js/b2c/discovery/marketplace.js"></script>
<script src="js/b2c/discovery/filters.js"></script>
<script src="js/b2c/discovery/search.js"></script>
<script src="js/b2c/discovery/shop.js"></script>
<script src="js/b2c/discovery/tow.js"></script>
<script src="js/b2c/discovery.js"></script>
<script src="js/b2c/booking.js"></script>
<script src="js/b2c/account.js"></script>
<script src="js/b2c/index.js"></script>
<script src="js/b2b/funnel.js"></script>
<script src="js/b2b/onboarding.js"></script>
<script src="js/b2b/operations.js"></script>
<script src="js/b2b/index.js"></script>
<script src="js/ftg/index.js"></script>
<script src="js/app.js"></script>
</body>
</html>
