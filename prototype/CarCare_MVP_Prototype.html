<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280" />
<title>CarCare — MVP UI/UX Prototype (B2C + B2B)</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #0F766E;        /* teal 700 */
    --brand-dark: #115E59;
    --brand-soft: #CCFBF1;
    --accent: #F97316;       /* orange 500 */
    --ink: #0F172A;
    --muted: #64748B;
    --bg: #F1F5F9;
  }
  html, body { font-family: 'Inter', system-ui, sans-serif; background: #E2E8F0; color: var(--ink); }
  .tab-active { background: var(--brand); color: #fff; }
  .screen-btn.active { background: var(--brand-soft); color: var(--brand-dark); font-weight: 600; }
  .phone-frame {
    width: 390px; height: 844px;
    border: 14px solid #0F172A; border-radius: 48px;
    background: #fff; overflow: hidden;
    position: relative;
    box-shadow: 0 30px 60px -20px rgba(15,23,42,.4), 0 10px 20px -10px rgba(15,23,42,.2);
  }
  .phone-frame::before {
    content: ""; position: absolute; top: 0; left: 50%;
    transform: translateX(-50%); width: 130px; height: 28px;
    background: #0F172A; border-radius: 0 0 18px 18px; z-index: 50;
  }
  .tablet-frame {
    width: 1024px; height: 720px;
    border: 14px solid #0F172A; border-radius: 32px;
    background: #fff; overflow: hidden;
    position: relative;
    box-shadow: 0 30px 60px -20px rgba(15,23,42,.4), 0 10px 20px -10px rgba(15,23,42,.2);
  }
  .screen { display: none; width: 100%; height: 100%; overflow: hidden; }
  .screen.active { display: flex; flex-direction: column; }
  .status-bar { height: 44px; padding: 12px 22px 0; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 600; color: var(--ink); }
  .home-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 130px; height: 5px; background: #0F172A; border-radius: 3px; z-index: 50; }
  .tap { cursor: pointer; transition: all .15s ease; }
  .tap:hover { filter: brightness(.97); }
  .pin { width: 38px; height: 38px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(15,23,42,.35); border: 2px solid white; }
  .pin > * { transform: rotate(45deg); }
  .skeleton { background: linear-gradient(90deg, #F1F5F9 25%, #E2E8F0 50%, #F1F5F9 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  /* Map canvas — fake streets via CSS gradients */
  .map-canvas {
    background:
      linear-gradient(90deg, rgba(203,213,225,.8) 1px, transparent 1px) 0 0/60px 60px,
      linear-gradient(0deg, rgba(203,213,225,.8) 1px, transparent 1px) 0 0/60px 60px,
      linear-gradient(45deg, #CFE9E3 0%, #DCEEF0 45%, #F0F5F5 100%);
  }
  .map-road-h { position: absolute; left: -5%; right: -5%; height: 14px; background: #fff; box-shadow: 0 0 0 1px #CBD5E1 inset; }
  .map-road-v { position: absolute; top: -5%; bottom: -5%; width: 12px; background: #fff; box-shadow: 0 0 0 1px #CBD5E1 inset; }
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; background: #fff; border: 1px solid #E2E8F0; font-size: 12px; font-weight: 500; color: var(--ink); box-shadow: 0 2px 6px rgba(15,23,42,.06); }
  .chip.on { background: var(--brand); color: #fff; border-color: var(--brand); }
  .btn-primary { background: var(--brand); color: #fff; font-weight: 600; border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-primary:hover { background: var(--brand-dark); }
  .btn-accent { background: var(--accent); color: #fff; font-weight: 600; border-radius: 14px; padding: 14px 16px; }
  .btn-ghost { background: #F1F5F9; color: var(--ink); font-weight: 600; border-radius: 14px; padding: 14px 16px; }
  .sheet { position: absolute; left: 0; right: 0; bottom: 0; background: #fff; border-radius: 24px 24px 0 0; box-shadow: 0 -8px 24px rgba(15,23,42,.12); }
  .tab-bar { height: 78px; border-top: 1px solid #E2E8F0; background: #fff; display: grid; grid-template-columns: repeat(5, 1fr); padding-bottom: 14px; }
  .tab { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; color: #64748B; font-size: 10px; font-weight: 500; }
  .b2b-tab-bar { height: 72px; border-top: 1px solid #E2E8F0; background: #fff; display: grid; grid-template-columns: repeat(4, 1fr); padding-bottom: 12px; }
  .b2b-tab-bar .tab { font-size: 10px; }
  .tab.on { color: var(--brand); }
  .tab .ic { width: 22px; height: 22px; }
  .label { font-size: 11px; letter-spacing: .04em; text-transform: uppercase; color: #64748B; font-weight: 600; }
  .divider { height: 1px; background: #E2E8F0; }
  .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }

  /* B2B tablet */
  .side-nav { width: 240px; background: #0F172A; color: #CBD5E1; display: flex; flex-direction: column; padding: 22px 14px; gap: 4px; }
  .side-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px; font-size: 14px; color: #CBD5E1; cursor: pointer; }
  .side-item.on { background: #14B8A6; color: #022; font-weight: 600; }
  .side-item:hover:not(.on) { background: #1E293B; color: #fff; }
  .kpi { background: #fff; border: 1px solid #E2E8F0; border-radius: 16px; padding: 18px; }
  .table th { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: #64748B; font-weight: 600; text-align: left; padding: 12px; background: #F8FAFC; }
  .table td { padding: 14px 12px; border-top: 1px solid #E2E8F0; font-size: 14px; color: var(--ink); }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .b-green { background: #DCFCE7; color: #166534; }
  .b-amber { background: #FEF3C7; color: #92400E; }
  .b-red   { background: #FEE2E2; color: #991B1B; }
  .b-blue  { background: #DBEAFE; color: #1E40AF; }
  .b-slate { background: #F1F5F9; color: #334155; }

  .rail { background: #fff; border-left: 1px solid #E2E8F0; width: 340px; overflow-y: auto; }
  .screen-list { max-height: calc(100vh - 220px); overflow-y: auto; }
  details summary { list-style: none; cursor: pointer; }
  details summary::-webkit-details-marker { display: none; }
</style>
</head>
<body class="min-h-screen">

<!-- ======================= APP SHELL ======================= -->
<div class="max-w-[1600px] mx-auto px-6 py-6">
  <header class="flex items-center justify-between mb-4">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:var(--brand);color:white;"><i data-lucide="wrench" class="w-5 h-5"></i></div>
      <div>
        <div class="text-lg font-bold tracking-tight">CarCare — MVP UI/UX Prototype</div>
        <div class="text-xs text-slate-500">Map-first maintenance marketplace · B2C + B2B · Flutter-targeted</div>
      </div>
    </div>
    <div class="flex items-center gap-2 bg-white rounded-xl p-1 border border-slate-200 shadow-sm">
      <button id="toggleB2C" class="px-4 py-2 rounded-lg text-sm font-semibold tab-active">B2C — Car Owner</button>
      <button id="toggleB2B" class="px-4 py-2 rounded-lg text-sm font-semibold text-slate-600">B2B — Service Center</button>
    </div>
  </header>

  <div class="grid grid-cols-[260px_1fr_340px] gap-5">
    <!-- LEFT: Screen picker -->
    <aside class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm h-fit sticky top-4">
      <div class="label mb-3">Screens</div>
      <div id="screenList" class="screen-list flex flex-col gap-1"></div>
      <div class="divider my-4"></div>
      <div class="text-xs text-slate-500 leading-relaxed">
        <div class="flex items-center gap-2 mb-1"><span class="dot" style="background:#10B981"></span>MVP scope (Phase 1)</div>
        <div class="flex items-center gap-2"><span class="dot" style="background:#F59E0B"></span>Phase 2 — retention layer</div>
      </div>
    </aside>

    <!-- MIDDLE: Device canvas -->
    <main class="flex items-start justify-center pt-4 pb-10" style="min-height: 900px;">
      <div id="b2cStage" class="phone-frame"></div>
      <div id="b2bStage" class="phone-frame hidden"></div>
    </main>

    <!-- RIGHT: Dev handoff notes -->
    <aside class="rail rounded-2xl border border-slate-200 p-5 shadow-sm h-fit sticky top-4" style="max-height: calc(100vh - 32px);">
      <div class="label mb-2">Screen spec</div>
      <div id="specPanel"></div>
    </aside>
  </div>

  <footer class="mt-10 text-xs text-slate-500 text-center pb-6">
    Built for developer handoff. Flutter target — layouts translate to Material/Cupertino widgets. Mock data is illustrative.
  </footer>
</div>

<!-- ======================= B2C SCREENS (injected) ======================= -->
<template id="b2c-screens"></template>

<!-- ======================= B2B SCREENS (injected) ======================= -->

function b2cTabBar(active){
  const items = [
    ['b2c-map','Map','map','map'],
    ['b2c-bookings','Bookings','calendar-check','bookings'],
    ['b2c-marketplace','Shop','store','market'],
    ['b2c-garage','Garage','car','garage'],
    ['b2c-dashboard','Home','gauge','home'],
  ];
  return '<div class="tab-bar">' + items.map(([id, label, icon, key]) => {
    const isOn = active === key;
    return `<div class="tab${isOn ? ' on' : ' tap'}"${!isOn ? ` onclick="show('${id}')"` : ''}><i data-lucide="${icon}" class="ic"></i>${label}</div>`;
  }).join('') + '</div>';
}

function b2bTabBar(active){

    ['b2b-bookings','Bookings','calendar','bookings'],
    ['b2b-catalog','Catalog','tag','catalog'],
    ['b2b-more','More','menu','more'],
  ];

    const isOn = active === key;
    return `<div class="tab${isOn ? ' on' : ' tap'}"${!isOn ? ` onclick="show('${id}')"` : ''}><i data-lucide="${icon}" class="ic"></i>${label}</div>`;
  }).join('') + '</div>';
}

/* =========================================================

   ========================================================= */
function onboardStepper(active){
  const steps = ['Business','Catalog'];
  return `<div class="flex flex-wrap items-center gap-2 sm:gap-3 mb-4">${steps.map((s,i)=>`
    <div class="flex items-center gap-2">
      <div class="w-7 h-7 rounded-full ${i<=active?'bg-teal-600 text-white':'bg-slate-200 text-slate-500'} flex items-center justify-center text-xs font-bold">${i<active?'✓':i+1}</div>
      <div class="text-sm font-medium ${i===active?'':'text-slate-500'}">${s}</div>
    </div>
    ${i<steps.length-1?`<div class="w-8 h-px ${i<active?'bg-teal-600':'bg-slate-200'}"></div>`:''}
  `).join('')}</div>`;
}

/* =========================================================
   Mount + nav
   ========================================================= */
const b2cStage = document.getElementById('b2cStage');
const b2bStage = document.getElementById('b2bStage');
Object.values(B2C_HTML).forEach(h => b2cStage.insertAdjacentHTML('beforeend', h));
Object.values(B2B_HTML).forEach(h => b2bStage.insertAdjacentHTML('beforeend', h));

let currentSurface = 'b2c';
let currentScreen = 'b2c-map';

function renderScreenList(){
  const list = document.getElementById('screenList');
  const arr = SCREENS[currentSurface];
  list.innerHTML = arr.map(s => `
    <button class="screen-btn ${s.id===currentScreen?'active':''} text-left text-sm px-3 py-2 rounded-lg hover:bg-slate-50 flex items-center justify-between" onclick="show('${s.id}')">
      <span class="flex items-center gap-2">
        <span class="dot" style="background:${s.phase===1?'#10B981':'#F59E0B'}"></span>
        <span>${s.name}</span>
      </span>
    </button>`).join('');
}

function renderSpec(){
  const all = [...SCREENS.b2c, ...SCREENS.b2b];
  const s = all.find(x => x.id === currentScreen);
  if (!s) return;
  document.getElementById('specPanel').innerHTML = `
    <div class="text-lg font-bold">${s.name}</div>
    <div class="mt-1 flex items-center gap-2"><span class="badge ${s.phase===1?'b-green':'b-amber'}">Phase ${s.phase}</span><span class="text-xs text-slate-500">${s.id}</span></div>
    <div class="mt-4 label">Purpose</div>
    <div class="text-sm mt-1">${s.purpose}</div>
    <div class="mt-4 label">States to build</div>
    <div class="mt-1 flex flex-wrap gap-1.5">${s.states.map(st => `<span class="chip">${st}</span>`).join('')}</div>
    <div class="mt-4 label">Dev notes</div>
    <div class="text-sm mt-1 text-slate-700 leading-relaxed">${s.notes}</div>
    <div class="divider my-4"></div>
    <div class="label">Related flows</div>
    <div class="text-xs text-slate-500 leading-relaxed mt-1">PRD §${s.id.startsWith('b2c')?'3':'4'} · Core flow ${s.id.startsWith('b2c')?'§6.1':'§6.3'}</div>
  `;
}

function show(id){
  const isB2B = id.startsWith('b2b-');
  if (isB2B && currentSurface !== 'b2b') switchSurface('b2b');
  if (!isB2B && currentSurface !== 'b2c') switchSurface('b2c');
  const stage = isB2B ? b2bStage : b2cStage;
  stage.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  const target = stage.querySelector(`[data-screen="${id}"]`);
  if (target) target.classList.add('active');
  currentScreen = id;
  renderScreenList();
  renderSpec();
  if (window.lucide) lucide.createIcons();
}

function switchSurface(s){
  currentSurface = s;
  document.getElementById('toggleB2C').className = 'px-4 py-2 rounded-lg text-sm font-semibold ' + (s==='b2c'?'tab-active':'text-slate-600');
  document.getElementById('toggleB2B').className = 'px-4 py-2 rounded-lg text-sm font-semibold ' + (s==='b2b'?'tab-active':'text-slate-600');
  document.getElementById('b2cStage').classList.toggle('hidden', s!=='b2c');
  document.getElementById('b2bStage').classList.toggle('hidden', s!=='b2b');
  if (s==='b2c' && !currentScreen.startsWith('b2c')) currentScreen = 'b2c-map';
  if (s==='b2b' && !currentScreen.startsWith('b2b')) currentScreen = 'b2b-dashboard';
  show(currentScreen);
}

document.getElementById('toggleB2C').addEventListener('click', () => switchSurface('b2c'));
document.getElementById('toggleB2B').addEventListener('click', () => switchSurface('b2b'));

// initial
show('b2c-map');
lucide.createIcons();
</script>
